<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#121212">
    <link rel="icon" type="image/png" sizes="192x192" href="AZ.png">
    <link rel="apple-touch-icon" href="AZ.png">
    <link rel="manifest" href="./manifest.json">
    
    <title>AZRA'S PLAYGROUND</title>
    <style>
        :root {
            --bg: #050505; 
            --panel: rgba(15, 15, 15, 0.95); 
            --border: #333;
            --neon: #00ffff; 
        }
        * { 
            margin: 0; padding: 0; box-sizing: border-box; 
            user-select: none; -webkit-user-select: none; 
            touch-action: none; font-family: monospace; 
        }
        body { background: var(--bg); height: 100vh; width: 100vw; overflow: hidden; color: #666; }
        #viewport { position: absolute; top: 0; left: 0; width: 100%; height: 100%; transform-origin: 0 0; }
        canvas { position: absolute; top: 0; left: 0; display: block; }
        #temp-canvas { z-index: 20; }
        
        /* Unified Dock Layout */
        .dock {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); width: 96%; max-width: 500px;
            display: flex; justify-content: space-between; background: var(--panel); padding: 10px;
            border-radius: 40px; border: 1px solid var(--border); z-index: 9999;
        }
        .dock-btn {
            flex: 1; height: 50px; margin: 0 4px; border-radius: 25px; border: 1px solid var(--border);
            background: #111; display: flex; align-items: center; justify-content: center;
            color: #888; font-size: 11px; font-weight: 900; transition: 0.2s; cursor: pointer;
        }
        
        /* Compact Circular Icon Ladder */
        .ladder {
            position: fixed; right: 15px; bottom: 100px; display: none; flex-direction: column; gap: 4px;
            z-index: 9998; width: 60px; max-height: 75vh; overflow-y: auto; padding-right: 2px;
        }
        .ladder::-webkit-scrollbar { display: none; }
        
        /* Transparent Circular Buttons */
        .ladder-btn {
            width: 50px; height: 50px; min-height: 42px; background: transparent; 
            border: 2px solid var(--border); border-radius: 50%; display: flex; 
            align-items: center; justify-content: center; cursor: pointer;
            overflow: hidden; position: relative; margin: 0 auto;
        }
        .ladder-btn img { width: 65%; height: 65%; object-fit: contain; pointer-events: none; }
        
        /* Dynamic Vault Thumbnail Styling */
        .vault-preview {
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            font-size: 8px;
            font-weight: 900;
            color: #fff;
            text-shadow: 1px 1px 2px #000;
            text-align: center;
            line-height: 46px;
        }
        
        /* Custom Independent Tool Border Identities */
        #tool-picker { border-color: #ffa500; }
        #tool-fill { border-color: #ffd700; }
        #tool-eraser { border-color: #ff4500; }
        #tool-glow-brush { border-color: #ff00ba; }
        #tool-text { border-color: #00ff00; }
        #tool-lasso-bg { border-color: #ff3366; }
        #tool-copy { border-color: #1e90ff; }
        #tool-paste { border-color: #9370db; }
        #tool-clear { border-color: #ffffff; }
        #tool-undo { border-color: #00ffff; }
        #tool-ai { border-color: #ff00ff; }

        /* Full Illuminating Invert Active State */
        .ladder-btn.active-btn {
            background: var(--neon) !important;
            border-color: var(--neon) !important;
            box-shadow: 0 0 15px var(--neon);
        }
        .ladder-btn.active-btn img { filter: invert(1) brightness(0); }
        .dock-btn.active-btn { border-color: var(--neon) !important; color: #000 !important; background: var(--neon); box-shadow: 0 0 15px var(--neon); }

        #ladder-color { width: 150px; background: var(--panel); padding: 15px; border-radius: 20px; border: 1px solid var(--border); }
        .slider-label { font-size: 10px; color: #888; margin-top: 10px; margin-bottom: 5px; }
        input[type="range"] { width: 100%; margin-bottom: 10px; }
        input[type="color"] { width: 100%; height: 40px; border: none; background: none; cursor: pointer; }
    </style>
</head>
<body>

    <div id="viewport">
        <canvas id="main-canvas"></canvas>
        <canvas id="temp-canvas"></canvas>
    </div>

    <div id="ladder-menu" class="ladder">
        <div class="ladder-btn" id="menu-load" onclick="loadFile('load')"><img src="load_icon.png" alt="LOAD"></div>
        <div class="ladder-btn" id="menu-import" onclick="loadFile('import')"><img src="import_icon.png" alt="IMPORT"></div>
        <div class="ladder-btn" id="menu-save" onclick="triggerSave()"><img src="save_icon.png" alt="SAVE"></div>
        <div class="ladder-btn vault-preview" id="menu-v1" onclick="vaultAct(0)">V1</div>
        <div class="ladder-btn vault-preview" id="menu-v2" onclick="vaultAct(1)">V2</div>
    </div>

    <div id="ladder-color" class="ladder">
        <div style="width:100%; display:flex; justify-content:center; margin-bottom:10px;">
            <canvas id="brush-preview" width="60" height="60" style="border-radius:50%; border:2px solid #fff;"></canvas>
        </div>
        <div class="slider-label" style="text-align:center; color:var(--neon);" id="color-hex-label">#00ffff</div>
        <input type="color" id="native-color" value="#00ffff">
        <div class="slider-label">SIZE</div><input type="range" id="slider-size" min="1" max="100" value="20">
        <div class="slider-label">LIGHTNESS</div><input type="range" id="slider-lightness" min="-50" max="50" value="0">
        <div class="slider-label">GLOW</div><input type="range" id="slider-glow" min="0" max="50" value="0">
    </div>

    <div id="ladder-tools" class="ladder">
        <div class="ladder-btn tool-btn" id="tool-picker" onclick="activateTool(this, 'PICKER')"><img src="picker_icon.png" alt="PICK"></div>
        <div class="ladder-btn tool-btn" id="tool-fill" onclick="activateTool(this, 'FILL')"><img src="fill_icon.png" alt="FILL"></div>
        <div class="ladder-btn tool-btn" id="tool-eraser" onclick="activateTool(this, 'ERASER')"><img src="eraser_icon.png" alt="ERASE"></div>
        <div class="ladder-btn tool-btn" id="tool-glow-brush" onclick="activateTool(this, 'GLOW_BRUSH')"><img src="glow_icon.png" alt="GLOW"></div>
        <div class="ladder-btn tool-btn" id="tool-text" onclick="activateTool(this, 'TEXT')"><img src="text_icon.png" alt="TXT"></div>
        <div class="ladder-btn tool-btn" id="tool-lasso-bg" onclick="activateTool(this, 'LASSO_BG')"><img src="scissors_icon.png" alt="CLIP"></div>
        <div class="ladder-btn tool-btn" id="tool-copy" onclick="activateTool(this, 'COPY')"><img src="copy_icon.png" alt="COPY"></div>
        <div class="ladder-btn tool-btn" id="tool-paste" onclick="activateTool(this, 'PASTE')"><img src="paste_icon.png" alt="PASTE"></div>
        <div class="ladder-btn" id="tool-clear" onclick="clearScratchpad()"><img src="clear_icon.png" alt="CLEAR"></div>
        <div class="ladder-btn" id="tool-undo" onclick="performUndo()"><img src="undo_icon.png" alt="UNDO"></div>
        <div class="ladder-btn" id="tool-ai" onclick="triggerAI()"><img src="ai_icon.png" alt="AI"></div>
    </div>

    <div id="ui-text" style="display:none; position:fixed; top:20%; left:50%; transform:translateX(-50%); width:90%; max-width:350px; padding:20px; background:rgba(15,15,15,0.98); border:1px solid #333; border-radius:20px; flex-direction:column; z-index:9999;">
        <input type="text" id="text-input" placeholder="Type here..." style="width:100%; height:40px; margin-bottom:15px; background:#111; color:#fff; border:1px solid #444; padding:10px; font-size:16px;">
        <div style="color:#888; font-size:10px; margin-bottom:5px;">FONT STYLE</div>
        <select id="text-font" style="width:100%; height:40px; margin-bottom:15px; background:#111; color:#fff; border:1px solid #444; padding:5px;">
            <option value="monospace">Typewriter</option>
            <option value="cursive">Cursive</option>
            <option value="sans-serif">Clean Bold</option>
        </select>
        <div style="color:#888; font-size:10px; margin-bottom:5px;">ROTATION</div>
        <input type="range" id="text-rotate" min="0" max="360" value="0" style="width:100%; margin-bottom:20px;" oninput="drawTextPreview()">
        <div style="display:flex; justify-content:space-between; gap:10px;">
            <div class="dock-btn" onclick="startTextSticker()">PLACE</div>
            <div class="dock-btn" onclick="cancelTextSticker()">CANCEL</div>
        </div>
    </div>
    
    <div id="ui-text-confirm" style="display:none; position:fixed; bottom:100px; left:50%; transform:translateX(-50%); z-index:9999;">
        <div class="dock-btn" onclick="confirmTextSticker()" style="width:150px;">STAMP TEXT</div>
    </div>

    <div class="dock">
        <div class="dock-btn" id="dock-menu" onclick="toggleLadder('menu')">MENU</div>
        <div class="dock-btn" id="dock-edit" onclick="toggleEdit()">EDIT</div>
        <div class="dock-btn" id="dock-color" onclick="toggleLadder('color')">COLOR</div>
        <div class="dock-btn" id="dock-tools" onclick="toggleLadder('tools')">TOOLS</div>
        <div class="dock-btn" id="dock-qsave" onclick="triggerQSave()">QSAVE</div>
    </div>

    <script>
        // GLOBAL VARIABLE DECK (INDEPENDENT PRIMITIVES STRUCT)
        let scale = 1;
        let panX = 0;
        let panY = 0;
        let isEditMode = false;
        let currentTool = null;
        let strokeHistory = []; 
        let lassoPoints = [];
        let clipboardData = null;
        let vaultIdx = 0;
        let baseHex = localStorage.getItem('saved_base_hex') || '#00ffff';
        let penColor = localStorage.getItem('saved_pen_color') || '#00ffff';
        let penSize = parseInt(localStorage.getItem('saved_size')) || 20;
        let glowSize = parseInt(localStorage.getItem('saved_glow')) || 0;
        let currentlyOpenLadder = null;
        let activeStrokePoints = [];

        const $ = id => document.getElementById(id);
        const viewport = $('viewport'), main = $('main-canvas'), temp = $('temp-canvas');
        const mctx = main.getContext('2d'), tctx = temp.getContext('2d', { willReadFrequently: true });

        function init() {
            main.width = temp.width = window.innerWidth;
            main.height = temp.height = window.innerHeight;
            main.style.width = temp.style.width = window.innerWidth + 'px';
            main.style.height = temp.style.height = window.innerHeight + 'px';
            mctx.lineCap = tctx.lineCap = mctx.lineJoin = tctx.lineJoin = 'round';
            
            $('native-color').value = baseHex;
            $('slider-size').value = penSize;
            $('slider-glow').value = glowSize;
            
            updateVaultThumbnails();
            applyColorToUI();
        }

        function toggleLadder(ladderName) {
            if (isEditMode) toggleEdit(); 

            $('ladder-menu').style.display = 'none';
            $('ladder-tools').style.display = 'none';
            $('ladder-color').style.display = 'none';
            $('dock-menu').classList.remove('active-btn');
            $('dock-tools').classList.remove('active-btn');

            if (currentlyOpenLadder === ladderName) {
                currentlyOpenLadder = null;
                return;
            }
            if ($( 'ladder-' + ladderName )) {
                $('ladder-' + ladderName).style.display = 'flex';
                currentlyOpenLadder = ladderName;
                if (ladderName !== 'color') $('dock-' + ladderName).classList.add('active-btn');
                if (ladderName === 'menu') updateVaultThumbnails();
            }
        }

        function toggleEdit() {
            isEditMode = !isEditMode;
            const editBtn = $('dock-edit');
            if (isEditMode) {
                editBtn.classList.add('active-btn');
                $('ladder-menu').style.display = 'none';
                $('ladder-tools').style.display = 'none';
                $('ladder-color').style.display = 'none';
                $('dock-menu').classList.remove('active-btn');
                $('dock-tools').classList.remove('active-btn');
                currentlyOpenLadder = null;
            } else { 
                editBtn.classList.remove('active-btn'); 
            }
        }

        function activateTool(element, toolName) {
            if (toolName === 'TEXT') { openTextMenu(); return; }
            if (toolName === 'COPY' || toolName === 'LASSO_BG') {
                if (isEditMode) toggleEdit();
            }

            if (currentTool === toolName) {
                element.classList.remove('active-btn');
                currentTool = null; 
                return;
            }
            document.querySelectorAll('.tool-btn').forEach(btn => btn.classList.remove('active-btn'));
            element.classList.add('active-btn');
            currentTool = toolName;
            
            document.documentElement.style.setProperty('--neon', window.getComputedStyle(element).borderColor);
        }

        function updateColorFromSliders() {
            penSize = parseInt($('slider-size').value);
            glowSize = parseInt($('slider-glow').value);
            baseHex = $('native-color').value;
            const lightness = parseInt($('slider-lightness').value);
            penColor = `color-mix(in srgb, ${baseHex}, ${lightness < 0 ? 'black' : 'white'} ${Math.abs(lightness)}%)`;
            
            localStorage.setItem('saved_base_hex', baseHex);
            localStorage.setItem('saved_pen_color', penColor);
            localStorage.setItem('saved_size', penSize);
            localStorage.setItem('saved_glow', glowSize);
            applyColorToUI();
        }

        function applyColorToUI() {
            const dockColor = $('dock-color');
            dockColor.style.borderColor = penColor;
            dockColor.style.color = penColor;
            if (!isEditMode) document.documentElement.style.setProperty('--neon', penColor);
            $('color-hex-label').innerText = baseHex.toUpperCase();

            const pCtx = $('brush-preview').getContext('2d');
            pCtx.clearRect(0, 0, 60, 60); pCtx.beginPath();
            pCtx.arc(30, 30, Math.min(penSize, 60) / 2, 0, Math.PI*2);
            pCtx.fillStyle = penColor; pCtx.shadowColor = penColor; pCtx.shadowBlur = glowSize; pCtx.fill();
        }

        $('native-color').oninput = updateColorFromSliders;
        $('slider-size').oninput = updateColorFromSliders;
        $('slider-lightness').oninput = updateColorFromSliders;
        $('slider-glow').oninput = updateColorFromSliders;

        function clearScratchpad() {
            tctx.clearRect(0, 0, temp.width, temp.height);
            strokeHistory = [];
            lassoPoints = [];
        }
        // ==========================================
        // VIEWPORT CAMERA ENGINE & TRANSLATIONS
        // ==========================================
        function updateViewport() {
            viewport.style.transform = `translate(${panX}px, ${panY}px) scale(${scale})`;
        }

        function getCanvasCoordinates(e) {
            const t = e.touches ? e.touches[0] : e;
            const r = temp.getBoundingClientRect();
            return {
                x: (t.clientX - r.left) / scale,
                y: (t.clientY - r.top) / scale
            };
        }

        // ==========================================
        // DYNAMIC FILE LOADER MATRIX (LOAD VS IMPORT)
        // ==========================================
        function loadFile(mode) {
            const input = document.createElement('input');
            input.type = 'file'; input.accept = 'image/*';
            input.onchange = e => {
                const reader = new FileReader();
                reader.onload = evt => {
                    const img = new Image();
                    img.onload = () => {
                        if (mode === 'load') {
                            // LOAD: Reset workspace parameters to raw image bounds
                            main.width = temp.width = img.width;
                            main.height = temp.height = img.height;
                            main.style.width = temp.style.width = img.width + 'px';
                            main.style.height = temp.style.height = img.height + 'px';
                            
                            // Clean canvas slates completely
                            mctx.clearRect(0, 0, main.width, main.height);
                            tctx.clearRect(0, 0, temp.width, temp.height);
                            strokeHistory = [];
                            lassoPoints = [];
                            
                            // Anchor camera perspective safely to display center
                            scale = Math.min(window.innerWidth / img.width, window.innerHeight / img.height, 1);
                            panX = (window.innerWidth - img.width * scale) / 2;
                            panY = (window.innerHeight - img.height * scale) / 2;
                            updateViewport();
                            
                            mctx.drawImage(img, 0, 0);
                        } else if (mode === 'import') {
                            // IMPORT: Map visible window constraints and force-fit target
                            const leftBound = -panX / scale;
                            const topBound = -panY / scale;
                            const currentViewWidth = window.innerWidth / scale;
                            const currentViewHeight = window.innerHeight / scale;
                            
                            // Stamp target element strictly over current zoom box onto scratchpad
                            tctx.drawImage(img, leftBound, topBound, currentViewWidth, currentViewHeight);
                        }
                        toggleLadder('none');
                    };
                    img.src = evt.target.result;
                };
                reader.readAsDataURL(e.target.files[0]);
            };
            input.click();
        }

        // ==========================================
        // BINARY VAULT RECOVERY ENGINE
        // ==========================================
        function updateVaultThumbnails() {
            for (let i = 0; i < 2; i++) {
                const btn = $('menu-v' + (i + 1));
                const savedData = localStorage.getItem('v' + i);
                if (savedData) {
                    btn.style.backgroundImage = `url(${savedData})`;
                    btn.innerText = '';
                } else {
                    btn.style.backgroundImage = 'none';
                    btn.innerText = 'EMPTY V' + (i + 1);
                }
            }
        }

        function triggerQSave() {
            // 1. Flatten scratchpad direct to base layer
            mctx.drawImage(temp, 0, 0);
            tctx.clearRect(0, 0, temp.width, temp.height);
            strokeHistory = []; // Wipe scratchpad stroke lists since edits are baked
            
            // 2 & 3. Compress data and deploy to active local index
            const compressedString = main.toDataURL('image/jpeg', 0.8);
            localStorage.setItem('v' + vaultIdx, compressedString);
            updateVaultThumbnails();
            
            // 4. Run binary remainder calculation loop switch
            vaultIdx = (vaultIdx + 1) % 2;
            
            // 5. Fire neon indicator feedback confirmation
            const qsaveBtn = $('dock-qsave');
            const originalBorder = qsaveBtn.style.borderColor;
            const originalColor = qsaveBtn.style.color;
            qsaveBtn.style.borderColor = '#2e5bff'; qsaveBtn.style.color = '#2e5bff';
            setTimeout(() => {
                qsaveBtn.style.borderColor = originalBorder;
                qsaveBtn.style.color = originalColor;
            }, 500);
        }

        function vaultAct(idx) {
            const vaultData = localStorage.getItem('v' + idx);
            if (!vaultData) return; // Unallocated slot safety trigger
            
            const img = new Image();
            img.onload = () => {
                main.width = temp.width = img.width;
                main.height = temp.height = img.height;
                main.style.width = temp.style.width = img.width + 'px';
                main.style.height = temp.style.height = img.height + 'px';
                mctx.clearRect(0, 0, main.width, main.height);
                tctx.clearRect(0, 0, temp.width, temp.height);
                strokeHistory = [];
                lassoPoints = [];
                mctx.drawImage(img, 0, 0);
            };
            img.src = vaultData;
            toggleLadder('none');
        }

        function triggerSave() {
            const downloadAnchor = document.createElement('a');
            downloadAnchor.download = 'STUDIO69_' + Date.now() + '.png';
            downloadAnchor.href = main.toDataURL('image/png');
            downloadAnchor.click();
        }
        // ==========================================
        // MISSING CORE TRACKING VARIABLE DECLARATIONS
        // ==========================================
        let lx = 0, ly = 0, cx = 0, cy = 0;

        // ==========================================
        // TEXT STICKER PREVIEW ENGINE (WITH PINCH SCALE)
        // ==========================================
        let textObj = { txt: '', font: '', rot: 0, x: 100, y: 100, scale: 1 };
        let dragBackup = null;

        function openTextMenu() {
            $('ui-text').style.display = 'flex';
            toggleLadder('none'); 
            dragBackup = tctx.getImageData(0, 0, temp.width, temp.height);
        }
        function startTextSticker() {
            textObj.txt = $('text-input').value; textObj.font = $('text-font').value; textObj.rot = parseInt($('text-rotate').value);
            if(!textObj.txt) return cancelTextSticker();
            $('ui-text').style.display = 'none'; $('ui-text-confirm').style.display = 'block';
            currentTool = 'TEXT_PLACE';
            textObj.x = temp.width / 2; textObj.y = temp.height / 2; textObj.scale = 1;
            drawTextPreview();
        }
        function cancelTextSticker() {
            $('ui-text').style.display = 'none'; $('ui-text-confirm').style.display = 'none';
            currentTool = null; document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active-btn'));
            if (dragBackup) tctx.putImageData(dragBackup, 0, 0);
        }
        function drawTextPreview() {
            if(currentTool !== 'TEXT_PLACE') return;
            textObj.rot = parseInt($('text-rotate').value);
            tctx.putImageData(dragBackup, 0, 0);
            tctx.save();
            tctx.translate(textObj.x, textObj.y); tctx.rotate(textObj.rot * Math.PI / 180);
            tctx.font = `${penSize * 2 * textObj.scale}px ${textObj.font}`;
            tctx.fillStyle = penColor; tctx.fillText(textObj.txt, 0, 0);
            tctx.restore();
        }
        function confirmTextSticker() {
            if(strokeHistory.length >= 10) strokeHistory.shift();
            strokeHistory.push({
                type: 'text', txt: textObj.txt, font: textObj.font, rot: textObj.rot,
                x: textObj.x, y: textObj.y, scale: textObj.scale, color: penColor, size: penSize
            });
            $('ui-text-confirm').style.display = 'none'; currentTool = null;
            document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active-btn'));
        }

        // ==========================================
        // UNIFIED TOUCH HANDLER ENGINE (ZERO-WIPE ZOOM)
        // ==========================================
        let isDrawingState = false;
        let isPanningState = false;
        let startTouchX = 0, startTouchY = 0;
        let initialTouchDistance = 0;

        window.addEventListener('touchstart', e => {
            if (e.touches.length === 1 && currentTool === 'TEXT_PLACE') {
                const pos = getCanvasCoordinates(e); textObj.x = pos.x; textObj.y = pos.y; drawTextPreview(); return;
            }
            if (e.touches.length === 2 && currentTool === 'TEXT_PLACE') {
                initialTouchDistance = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
                return;
            }
            
            if (e.touches.length === 1 && isEditMode) {
                isDrawingState = true;
                const pos = getCanvasCoordinates(e);
                lx = cx = pos.x; ly = cy = pos.y;
                activeStrokePoints = [{x: pos.x, y: pos.y}];
                executeToolLogic(pos.x, pos.y, 'start');
            } else if (e.touches.length === 1 && !isEditMode) {
                isPanningState = true;
                startTouchX = e.touches[0].clientX - panX;
                startTouchY = e.touches[0].clientY - panY;
            } else if (e.touches.length === 2) {
                isPanningState = true; isDrawingState = false;
                startTouchX = (e.touches[0].clientX + e.touches[1].clientX) / 2 - panX;
                startTouchY = (e.touches[0].clientY + e.touches[1].clientY) / 2 - panY;
                initialTouchDistance = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
            }
        }, { passive: false });

        window.addEventListener('touchmove', e => {
            if (e.touches.length === 1 && currentTool === 'TEXT_PLACE') {
                const pos = getCanvasCoordinates(e); textObj.x = pos.x; textObj.y = pos.y; drawTextPreview(); return;
            }
            if (e.touches.length === 2 && currentTool === 'TEXT_PLACE') {
                const currentDistance = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
                if (initialTouchDistance > 0) {
                    textObj.scale *= (currentDistance / initialTouchDistance);
                    initialTouchDistance = currentDistance;
                    drawTextPreview();
                }
                return;
            }
            
            if (isDrawingState && isEditMode && e.touches.length === 1) {
                const pos = getCanvasCoordinates(e);
                activeStrokePoints.push({x: pos.x, y: pos.y});
                executeToolLogic(pos.x, pos.y, 'move');
            } else if (isPanningState && !isEditMode && e.touches.length === 1) {
                panX = e.touches[0].clientX - startTouchX;
                panY = e.touches[0].clientY - startTouchY;
                updateViewport();
            } else if (isPanningState && e.touches.length === 2) {
                const currentMidpointX = (e.touches[0].clientX + e.touches[1].clientX) / 2;
                const currentMidpointY = (e.touches[0].clientY + e.touches[1].clientY) / 2;
                const currentDistance = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
                
                if (initialTouchDistance > 0) {
                    const currentScaleMultiplier = currentDistance / initialTouchDistance;
                    scale *= currentScaleMultiplier;
                    scale = Math.max(0.1, Math.min(scale, 20));
                    panX = currentMidpointX - startTouchX * currentScaleMultiplier;
                    panY = currentMidpointY - startTouchY * currentScaleMultiplier;
                    startTouchX = currentMidpointX; startTouchY = currentMidpointY;
                    initialTouchDistance = currentDistance;
                    updateViewport();
                }
            }
        }, { passive: false });

        window.addEventListener('touchend', e => {
            if (isDrawingState) {
                executeToolLogic(0, 0, 'end');
                if (activeStrokePoints.length > 0 && (!currentTool || currentTool === 'GLOW_BRUSH' || currentTool === 'ERASER')) {
                    if (strokeHistory.length >= 10) strokeHistory.shift();
                    strokeHistory.push({
                        type: 'freehand', points: activeStrokePoints,
                        color: penColor, size: penSize, glow: (currentTool === 'GLOW_BRUSH' ? glowSize : 0),
                        isEraser: (currentTool === 'ERASER')
                    });
                }
            }
            isDrawingState = isPanningState = false;
            initialTouchDistance = 0;
        });

        // ==========================================
        // CAPABILITY MATRIX LOGIC (TRACED INTERFACES)
        // ==========================================
        function executeToolLogic(x, y, stage) {
            if (!currentTool || currentTool === 'GLOW_BRUSH') {
                if (stage === 'start') { tctx.beginPath(); tctx.moveTo(x, y); }
                if (stage === 'move') {
                    tctx.lineWidth = penSize; tctx.strokeStyle = penColor;
                    tctx.shadowColor = penColor; tctx.shadowBlur = (currentTool === 'GLOW_BRUSH' ? glowSize : 0);
                    
                    const midX = (x + lx) / 2; const midY = (y + ly) / 2;
                    tctx.quadraticCurveTo(lx, ly, midX, midY); tctx.stroke();
                    lx = x; ly = y;
                }
                return;
            }

            if (currentTool === 'ERASER') {
                if (stage === 'move') {
                    tctx.save(); tctx.globalCompositeOperation = 'destination-out';
                    tctx.beginPath(); tctx.arc(x, y, penSize / 2, 0, Math.PI * 2); tctx.fill();
                    tctx.restore();
                }
                return;
            }

            if (currentTool === 'FILL' && stage === 'start') {
                if (lassoPoints.length >= 3) {
                    tctx.save(); tctx.beginPath();
                    tctx.moveTo(lassoPoints[0].x, lassoPoints[0].y);
                    for (let i = 1; i < lassoPoints.length; i++) tctx.lineTo(lassoPoints[i].x, lassoPoints[i].y);
                    tctx.closePath(); tctx.fillStyle = penColor; tctx.shadowBlur = 0; tctx.fill();
                    tctx.restore();
                    
                    if (strokeHistory.length >= 10) strokeHistory.shift();
                    strokeHistory.push({ type: 'fill_trace', path: [...lassoPoints], color: penColor });
                }
                return;
            }

            if (currentTool === 'PICKER' && stage === 'start') {
                const sample = mctx.getImageData(x, y, 1, 1).data;
                baseHex = "#" + ("000000" + ((sample[0] << 16) | (sample[1] << 8) | sample[2]).toString(16)).slice(-6);
                $('native-color').value = baseHex;
                updateColorFromSliders();
                return;
            }

            if (currentTool === 'COPY' || currentTool === 'LASSO_BG') {
                if (!isEditMode) {
                    if (stage === 'start') { lassoPoints = [{x, y}]; tctx.clearRect(0, 0, temp.width, temp.height); }
                    if (stage === 'move') {
                        lassoPoints.push({x, y});
                        tctx.lineWidth = 2; tctx.strokeStyle = '#00ffff'; tctx.setLineDash([4, 4]); tctx.beginPath();
                        tctx.moveTo(lassoPoints[0].x, lassoPoints[0].y);
                        for(let i=1; i<lassoPoints.length; i++) tctx.lineTo(lassoPoints[i].x, lassoPoints[i].y);
                        tctx.stroke(); tctx.setLineDash([]);
                    }
                } else if (isEditMode && stage === 'start') {
                    if (lassoPoints.length < 3) return;
                    
                    if (currentTool === 'COPY') {
                        tctx.clearRect(0, 0, temp.width, temp.height);
                        tctx.save(); tctx.beginPath();
                        tctx.moveTo(lassoPoints[0].x, lassoPoints[0].y);
                        for(let i=1; i<lassoPoints.length; i++) tctx.lineTo(lassoPoints[i].x, lassoPoints[i].y);
                        tctx.closePath(); tctx.clip();
                        tctx.drawImage(main, 0, 0); tctx.restore();
                        clipboardData = tctx.getImageData(0, 0, temp.width, temp.height);
                    } else if (currentTool === 'LASSO_BG') {
                        mctx.save(); mctx.beginPath();
                        mctx.moveTo(lassoPoints[0].x, lassoPoints[0].y);
                        for(let i=1; i<lassoPoints.length; i++) mctx.lineTo(lassoPoints[i].x, lassoPoints[i].y);
                        mctx.closePath(); mctx.clip();
                        
                        const masterBackup = new Image();
                        masterBackup.src = main.toDataURL();
                        masterBackup.onload = () => {
                            mctx.clearRect(0, 0, main.width, main.height);
                            mctx.drawImage(masterBackup, 0, 0);
                            mctx.restore();
                        };
                    }
                    tctx.clearRect(0, 0, temp.width, temp.height);
                }
            }
            
            if (currentTool === 'PASTE' && stage === 'start' && clipboardData) {
                tctx.putImageData(clipboardData, 0, 0);
                if (strokeHistory.length >= 10) strokeHistory.shift();
                strokeHistory.push({ type: 'clipboard_paste', data: clipboardData });
            }
        }

        // ==========================================
        // ROLLING VECTOR PATH MULTI-STEP UNDO
        // ==========================================
        function performUndo() {
            if (strokeHistory.length === 0) return;
            strokeHistory.pop();
            tctx.clearRect(0, 0, temp.width, temp.height);
            
            strokeHistory.forEach(item => {
                if (item.type === 'freehand') {
                    if (item.points.length < 2) return;
                    tctx.save();
                    if (item.isEraser) tctx.globalCompositeOperation = 'destination-out';
                    
                    tctx.beginPath();
                    tctx.lineWidth = item.size; tctx.strokeStyle = item.color;
                    tctx.shadowColor = item.color; tctx.shadowBlur = item.glow;
                    tctx.moveTo(item.points[0].x, item.points[0].y);
                    
                    for (let i = 1; i < item.points.length; i++) {
                        const xc = (item.points[i].x + item.points[i-1].x) / 2;
                        const yc = (item.points[i].y + item.points[i-1].y) / 2;
                        tctx.quadraticCurveTo(item.points[i-1].x, item.points[i-1].y, xc, yc);
                    }
                    tctx.stroke(); tctx.restore();
                } else if (item.type === 'fill_trace') {
                    tctx.save(); tctx.beginPath();
                    tctx.moveTo(item.path[0].x, item.path[0].y);
                    for(let i=1; i<item.path.length; i++) tctx.lineTo(item.path[i].x, item.path[i].y);
                    tctx.closePath(); tctx.fillStyle = item.color; tctx.shadowBlur = 0; tctx.fill();
                    tctx.restore();
                } else if (item.type === 'text') {
                    tctx.save(); tctx.translate(item.x, item.y); tctx.rotate(item.rot * Math.PI / 180);
                    tctx.font = `${item.size * 2 * item.scale}px ${item.font}`;
                    tctx.fillStyle = item.color; tctx.fillText(item.txt, 0, 0);
                    tctx.restore();
                } else if (item.type === 'clipboard_paste') {
                    tctx.putImageData(item.data, 0, 0);
                }
            });
        }

        // ==========================================
        // DETAILED AI DATA CAPTURE HOOK
        // ==========================================
        function triggerAI() {
            const aiDataStream = main.toDataURL('image/png');
            console.log('AI Pipeline Triggered: Layer matrix captured successfully.', aiDataStream.substring(0, 60) + '...');
        }

        window.onload = init;
    </script>
